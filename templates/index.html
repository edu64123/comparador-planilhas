<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Planilhas</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: #1f2937;
            padding: 30px;
            border-radius: 12px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input[type=file] {
            background: #374151;
            padding: 10px;
            border-radius: 8px;
            color: white;
        }

        button {
            background: #2563eb;
            border: none;
            padding: 14px;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        table th,
        table td {
            border: 1px solid #374151;
            padding: 12px;
            text-align: left;
        }

        table th {
            background: #2563eb;
        }

        .erro {
            margin-top: 20px;
            background: #7f1d1d;
            padding: 15px;
            border-radius: 8px;
        }

        .sucesso {
            margin-top: 20px;
            background: #14532d;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

</html>
